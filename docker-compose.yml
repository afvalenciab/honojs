services:
  db:
    image: postgres:17-alpine
    container_name: hono-tasks-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasks_dev
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tasks_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
